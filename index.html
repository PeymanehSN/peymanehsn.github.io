<section id="thesis">
<div class="wrap">
<div class="section-head">
<div class="kicker">Founder Thesis</div>
<div class="section-title">The best products do not only digitize behavior. They redesign decisions.</div>
</div>

<p class="lead">
Many products assume people will act once they have more information.
My work starts from a different observation: people often delay, avoid,
or misjudge decisions because the environment around the decision is poorly designed.
</p>

<div class="grid three">
<article class="card">
<div class="label">Hidden value</div>
<h3>People often misjudge what they already have.</h3>
<p>
Value becomes invisible when it is not measured, framed, or connected to a next step.
</p>
</article>

<article class="card">
<div class="label">Decision friction</div>
<h3>Good intentions often fail at the moment of action.</h3>
<p>
People may care, but they hesitate when trust is missing, effort is high,
or the path forward is unclear.
</p>
</article>

<article class="card feature">
<div class="label">Founder edge</div>
<h3>Behavioral economics becomes product strategy.</h3>
<p>
I identify where behavior breaks down, then design systems that make action
easier, more valuable, and more natural.
</p>
</article>
</div>

<br /><br />

<p>
I am drawn to problems where people already have options, but still fail to act.
Those are the spaces where better incentives, better trust signals, and better product
architecture can create meaningful change.
</p>
</div>

<div class="grid">
<article class="card feature">
<div class="label">Current Venture</div>
<h3>BAVO</h3>
<p>
BAVO is my current venture at the intersection of behavioral economics,
AI-enabled product design, sustainability, and consumer decision-making.
</p>
<p>
The venture began from a behavioral insight: ownership is one of the most
under-designed parts of consumer life. People often own valuable things they rarely use,
but they lack systems that help them see that value, understand it, and act on it.
</p>
<p>
My role has been to identify the market thesis, shape the behavioral wedge,
assemble the founding team, lead early validation, and define the product direction
from consumer tool to ownership intelligence infrastructure.
</p>
<p>
BAVO reflects the kind of company I want to build: one where behavioral insight
is not an accessory to the product — it is the architecture.
</p>

<article class="card">
<div class="label">Previous Venture</div>
<h3>MindMeld Money</h3>
<p>
MindMeld Money was an experimental fintech platform applying game theory
and behavioral economics to investor decision-making.
</p>
<p>
The idea was to help users understand financial choices through interactive scenarios,
simulations, and gamified learning rather than traditional advisory formats.
</p>
<p>
I designed user research, surveys, focus groups, and behavioral experiments with early users.
The project taught me how to move from theory to product: from research insight,
to hypothesis, to prototype, to user feedback.
</p>
